# DeepTFUS reproduction config (paper recipe).
#
# Paper: Srivastav et al., "A Skull-Adaptive Framework for AI-Based 3D
# Transcranial Focused Ultrasound Simulation", arXiv:2505.12998.
#
# For local Mac smoke testing, use `python scripts/local_verify.py`; that
# script overrides the heavy fields in-process. Do not edit this file
# for verification.
#
# Launch:
#   python train.py --config configs/base.yaml
#
# Architectural specifics the paper does not pin down (base_width,
# Fourier frequency count, dynamic-conv kernel size, cross-attention
# head count, which encoder levels carry cross-attention) are flagged
# TENTATIVE below.

data:
  resolution: 256                  # paper: 256^3 cropped subvolumes
  n_transducer_points: 512         # uniform random subsample per step

model:
  base_width: 16                   # TENTATIVE; paper does not specify capacity. Picked 16
                                   # because the paper's own ablation (Table 1) shows
                                   # DeepTFUStiny within 1σ of DeepTFUS on every metric, and
                                   # neither variant has a published param count. 16 -> 3.4M
                                   # params, ~9h at 50 epochs on H100, fits without
                                   # grad-checkpointing.
  cond_dim: 128                    # transducer embedding dim (z_T)
  n_transducer_freqs: 8            # TENTATIVE; paper says "Fourier PE" with no count
  dynamic_conv_kernel: 3           # TENTATIVE; paper does not specify
  cross_attention_heads: 4         # TENTATIVE
  cross_attention_levels: [level1, level2, level3, bottleneck]
                                   # Paper says "each encoder level"; level0 at
                                   # 256^3 is OOM on a single 80GB H100 even with
                                   # bidirectional CA disabled. level1..bottleneck
                                   # fit and match the paper at each of those
                                   # levels.

  cross_attention_bidirectional: false
                                   # Paper says "bi-directional ... two multi-head
                                   # attention blocks". Default is false because
                                   # direction 1 (CT-queries-z_T) is degenerate
                                   # with z_T as a single token: softmax over one
                                   # key is identically 1, so it collapses to a
                                   # learned broadcast of a projection of z_T.
                                   # Flip to true to recover the paper-faithful
                                   # bi-directional design.

  use_film_decoder: false          # Paper §3.2 puts FiLM in the decoding path.
                                   # Default off because the paper's own Table 1
                                   # "No FiLM" row shows lower max_pressure_error
                                   # than full DeepTFUS, within 1 sigma on every
                                   # other metric. Flip to true to recover
                                   # paper-faithful FiLM.

loss:
  alpha: 5.0                       # paper Eq 5: exponent in w(v)=exp(alpha*(P-maxP))/E[...]
  grad_weight: 0.1                 # paper: lambda for the gradient-L1 term

train:
  epochs: 50                       # paper
  batch_size: 4                    # paper
  lr: 0.001                        # paper
  weight_decay: 0.0001
  grad_clip: 1.0
  seed: 0
  num_workers: 4                   # for CUDA; local_verify forces 0 on MPS
  val_every: 1                     # epochs

  # Precision / memory. The H100 path needs pure-bf16 to fit batch=4 at
  # 256^3 (fp32 OOMs on the first encoder level; autocast bf16 also OOMs
  # because GroupNorm/FiLM upcast paths leak fp32 into downstream
  # activations). local_verify.py overrides these to fp32/false for the
  # CPU/MPS smoke test.
  precision: pure-bf16             # fp32 | pure-bf16
  grad_checkpoint_encoder: false   # fits without checkpointing at base_width=16

  # Speedups, both default off after empirical findings:
  channels_last: false             # channels_last_3d was ~17% slower on this model
                                   # because cuDNN's 3D NHWC kernels don't have a
                                   # good path for the depthwise grouped DynamicConv3d.
  compile: false                   # torch.compile OOMs the up1 decoder stage because
                                   # Inductor materializes the (B, 48, 256^3) ≈ 6 GiB
                                   # concat intermediate that eager mode streams through.

  # WandB telemetry. wandb.init no-ops if WANDB_API_KEY is unset OR
  # wandb_project is null.
  wandb_project: deeptfus-reproduction
  # wandb_entity: your-team-or-user

  # Per-epoch checkpoint frequency. 0 disables (only ckpt_best and ckpt_last
  # are written). Set to e.g. 5 to keep ckpt_epoch_004.pt etc. Each ckpt
  # is ~20 MB at base_width=16.
  save_every_epochs: 0

eval:
  voxel_size_mm: 0.5               # paper Section 3.3 (k-Wave grid)
  focal_threshold_db: -6.0         # iso-surface threshold for focal-volume Dice
  off_target_min_dist_mm: 10.0     # secondary-lobe radius exclusion
  n_warmup_inferences: 3           # for latency measurement
  save_predictions: true           # write per-sample pred npz for figures

output:
  run_dir: runs/deeptfus
